spring:
  application:
    name: sensor-monitor
  task:
    execution:
      pool:
        core-size: 2
        max-size: 4
        queue-capacity: 20

  datasource:
    url: jdbc:postgresql://localhost:5432/sensor_monitor
    username: postgres
    password: password

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

alert:
  recipient-email: ${ALERT_RECIPIENT_EMAIL}
  cooldown-minutes: 10
  thresholds:
    temperature-max: 35.0
    humidity-max: 80.0
    pressure-min: 950.0
    pressure-max: 1050.0
    distance-min: 10.0
    offline-minutes: 5

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics
  endpoint:
    prometheus:
      enabled: true
  health:
    mail:
      enabled: false
  metrics:
    export:
      prometheus:
        enabled: true
