spring:
  application:
    name: sensor-monitor
  task:
    execution:
      pool:
        core-size: 2
        max-size: 4
        queue-capacity: 20

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sensor_monitor}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:password}

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

alert:
  recipient-email: ${ALERT_RECIPIENT_EMAIL}
  cooldown-minutes: 10
  thresholds:
    temperature-max: 35.0
    humidity-max: 80.0
    pressure-min: 950.0
    pressure-max: 1050.0
    distance-min: 10.0
    offline-minutes: 5

analysis:
  window-size: 30
  zscore-threshold: 3.5
  drift-slope-threshold: 0.105  # max для идеальной линии при N=30 ≈ 0.1155
  zscore-thresholds:
    pressure_hpa: 5.0   # давление атмосферное медленно плавает
    temperature: 3.5
    humidity: 3.5
    distance_cm: 4.0
    raw_value: 4.0
  drift-slope-thresholds:
    pressure_hpa: 0.112  # чуть ниже теормакса — только для реального дрейфа датчика
    temperature: 0.105
    humidity: 0.105
    distance_cm: 0.105
    raw_value: 0.108

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics
  endpoint:
    prometheus:
      enabled: true
  health:
    mail:
      enabled: false
  metrics:
    export:
      prometheus:
        enabled: true
